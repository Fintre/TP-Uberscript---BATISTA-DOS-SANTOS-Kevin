<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Restaurant Menu App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center mb-5">Gestion de Menu Restaurant</h1>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body">
              <h5 class="card-title">Créer un repas</h5>
              <div class="mb-3">
                <label class="form-label">Nom</label>
                <input id="mealName" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Calories</label>
                <input id="mealCalories" type="number" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Prix (€)</label>
                <input id="mealPrice" type="number" class="form-control" />
              </div>
              <button id="addMealBtn" class="btn btn-primary w-100">
                Ajouter le repas
              </button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body">
              <h5 class="card-title">Liste des repas</h5>
              <ul id="mealList" class="list-group"></ul>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body">
              <h5 class="card-title">Portefeuille</h5>
              <p>Solde : <span id="walletAmount">--</span></p>
            </div>
          </div>
        </div>

        <div class="col-md-12">
          <div class="card shadow">
            <div class="card-body">
              <h5 class="card-title">Historique des commandes</h5>
              <ul id="orderHistory" class="list-group"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
